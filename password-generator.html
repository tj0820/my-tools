<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>随机密码生成器 - 在线生成安全强密码</title>
  <meta name="description" content="免费在线随机密码生成器，支持自定义密码长度、包含字符类型（大写字母、小写字母、数字、特殊符号），一键生成安全强密码，支持批量生成。">
  <meta name="keywords" content="密码生成器,随机密码,强密码生成,在线密码工具,密码生成">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      min-height: 100vh;
      padding: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      max-width: 600px;
      width: 100%;
    }
    .header {
      text-align: center;
      padding: 20px 0 24px;
    }
    .header h1 {
      color: #fff;
      font-size: 28px;
      margin-bottom: 8px;
    }
    .header p {
      color: rgba(255,255,255,0.5);
      font-size: 14px;
    }
    .card {
      background: rgba(255,255,255,0.07);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 18px;
      padding: 28px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    }
    .password-display {
      background: rgba(0,0,0,0.3);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 24px;
      position: relative;
      min-height: 72px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .password-text {
      font-family: "Fira Code", "Consolas", monospace;
      font-size: 20px;
      color: #43e97b;
      word-break: break-all;
      text-align: center;
      letter-spacing: 1px;
      user-select: all;
    }
    .password-text.placeholder {
      color: rgba(255,255,255,0.25);
      font-size: 14px;
      letter-spacing: 0;
    }
    .copy-btn {
      position: absolute;
      top: 10px;
      right: 10px;
      background: rgba(255,255,255,0.1);
      border: none;
      color: #fff;
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .copy-btn:hover { background: rgba(255,255,255,0.2); }
    .strength-bar {
      height: 6px;
      border-radius: 3px;
      background: rgba(255,255,255,0.1);
      margin-bottom: 8px;
      overflow: hidden;
    }
    .strength-fill {
      height: 100%;
      border-radius: 3px;
      transition: width 0.3s, background 0.3s;
      width: 0%;
    }
    .strength-label {
      text-align: right;
      font-size: 12px;
      color: rgba(255,255,255,0.5);
      margin-bottom: 20px;
    }
    .option-group {
      margin-bottom: 18px;
    }
    .option-group label {
      display: block;
      color: rgba(255,255,255,0.7);
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 8px;
    }
    .length-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .length-row input[type="range"] {
      flex: 1;
      -webkit-appearance: none;
      appearance: none;
      height: 6px;
      background: rgba(255,255,255,0.15);
      border-radius: 3px;
      outline: none;
    }
    .length-row input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 18px; height: 18px;
      border-radius: 50%;
      background: #43e97b;
      cursor: pointer;
      box-shadow: 0 2px 6px rgba(67,233,123,0.4);
    }
    .length-value {
      color: #43e97b;
      font-size: 18px;
      font-weight: 700;
      min-width: 32px;
      text-align: right;
    }
    .checkbox-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .checkbox-item {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,255,255,0.05);
      padding: 10px 14px;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .checkbox-item:hover { background: rgba(255,255,255,0.1); }
    .checkbox-item input[type="checkbox"] {
      width: 16px; height: 16px;
      accent-color: #43e97b;
      cursor: pointer;
    }
    .checkbox-item span {
      color: rgba(255,255,255,0.8);
      font-size: 13px;
    }
    .checkbox-item .sample {
      color: rgba(255,255,255,0.3);
      font-size: 11px;
      font-family: "Fira Code", monospace;
      margin-left: auto;
    }
    .batch-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .batch-row input[type="number"] {
      width: 70px;
      padding: 8px 10px;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 8px;
      background: rgba(0,0,0,0.2);
      color: #fff;
      font-size: 14px;
      outline: none;
    }
    .batch-row input[type="number"]:focus {
      border-color: #43e97b;
    }
    .batch-row span {
      color: rgba(255,255,255,0.5);
      font-size: 13px;
    }
    .generate-btn {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, #43e97b, #38f9d7);
      color: #1a1a2e;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 20px;
    }
    .generate-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(67,233,123,0.3);
    }
    .batch-output {
      margin-top: 16px;
      background: rgba(0,0,0,0.2);
      border-radius: 10px;
      padding: 14px;
      max-height: 200px;
      overflow-y: auto;
      display: none;
    }
    .batch-output .batch-item {
      font-family: "Fira Code", monospace;
      font-size: 13px;
      color: #43e97b;
      padding: 4px 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .batch-output .batch-item:last-child { border-bottom: none; }
    .batch-output .batch-copy {
      background: none;
      border: none;
      color: rgba(255,255,255,0.4);
      font-size: 11px;
      cursor: pointer;
    }
    .batch-output .batch-copy:hover { color: #fff; }
    .footer {
      text-align: center;
      padding: 20px 0 0;
      color: rgba(255,255,255,0.25);
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>随机密码生成器</h1>
      <p>生成安全强密码，本地计算，数据不上传</p>
    </div>

    <div class="card">
      <!-- 密码显示 -->
      <div class="password-display">
        <div class="password-text placeholder" id="passwordText">点击生成按钮创建密码</div>
        <button class="copy-btn" id="copyBtn" onclick="copyPassword()">复制</button>
      </div>

      <!-- 强度条 -->
      <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
      <div class="strength-label" id="strengthLabel">强度：—</div>

      <!-- 密码长度 -->
      <div class="option-group">
        <label>密码长度</label>
        <div class="length-row">
          <input type="range" id="lengthSlider" min="4" max="64" value="16">
          <span class="length-value" id="lengthValue">16</span>
        </div>
      </div>

      <!-- 字符类型 -->
      <div class="option-group">
        <label>包含字符</label>
        <div class="checkbox-grid">
          <label class="checkbox-item">
            <input type="checkbox" id="useUpper" checked>
            <span>大写字母</span>
            <span class="sample">A-Z</span>
          </label>
          <label class="checkbox-item">
            <input type="checkbox" id="useLower" checked>
            <span>小写字母</span>
            <span class="sample">a-z</span>
          </label>
          <label class="checkbox-item">
            <input type="checkbox" id="useDigits" checked>
            <span>数字</span>
            <span class="sample">0-9</span>
          </label>
          <label class="checkbox-item">
            <input type="checkbox" id="useSymbols" checked>
            <span>特殊符号</span>
            <span class="sample">!@#$</span>
          </label>
        </div>
      </div>

      <!-- 批量生成 -->
      <div class="option-group">
        <label>批量生成</label>
        <div class="batch-row">
          <input type="number" id="batchCount" min="1" max="20" value="1">
          <span>个密码（1~20）</span>
        </div>
      </div>

      <button class="generate-btn" onclick="generatePasswords()">生成密码</button>

      <!-- 批量输出 -->
      <div class="batch-output" id="batchOutput"></div>
    </div>

    <div class="footer">纯浏览器端生成 &middot; 密码不会上传到任何服务器</div>
  </div>

  <script>
    var lengthSlider = document.getElementById('lengthSlider');
    var lengthValue = document.getElementById('lengthValue');

    lengthSlider.addEventListener('input', function() {
      lengthValue.textContent = this.value;
    });

    function generatePasswords() {
      var length = parseInt(lengthSlider.value);
      var useUpper = document.getElementById('useUpper').checked;
      var useLower = document.getElementById('useLower').checked;
      var useDigits = document.getElementById('useDigits').checked;
      var useSymbols = document.getElementById('useSymbols').checked;
      var batchCount = parseInt(document.getElementById('batchCount').value);

      if (!useUpper && !useLower && !useDigits && !useSymbols) {
        alert('请至少选择一种字符类型');
        return;
      }

      var chars = '';
      if (useUpper) chars += 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
      if (useLower) chars += 'abcdefghijklmnopqrstuvwxyz';
      if (useDigits) chars += '0123456789';
      if (useSymbols) chars += '!@#$%^&*()_+-=[]{}|;:,.<>?';

      var passwords = [];
      for (var i = 0; i < batchCount; i++) {
        var password = '';
        var array = new Uint32Array(length);
        crypto.getRandomValues(array);
        for (var j = 0; j < length; j++) {
          password += chars[array[j] % chars.length];
        }
        passwords.push(password);
      }

      if (batchCount === 1) {
        var el = document.getElementById('passwordText');
        el.textContent = passwords[0];
        el.className = 'password-text';
        document.getElementById('batchOutput').style.display = 'none';
        updateStrength(passwords[0]);
      } else {
        var el = document.getElementById('passwordText');
        el.textContent = '已生成 ' + batchCount + ' 个密码';
        el.className = 'password-text placeholder';
        var output = document.getElementById('batchOutput');
        output.style.display = 'block';
        output.innerHTML = '';
        for (var i = 0; i < passwords.length; i++) {
          var div = document.createElement('div');
          div.className = 'batch-item';
          div.innerHTML = '<span>' + passwords[i] + '</span><button class="batch-copy" onclick="copyOne(this, \'' + passwords[i].replace(/'/g, "\\'") + '\')">复制</button>';
          output.appendChild(div);
        }
        updateStrength(passwords[0]);
      }
    }

    function updateStrength(password) {
      var score = 0;
      if (password.length >= 8) score++;
      if (password.length >= 12) score++;
      if (password.length >= 16) score++;
      if (/[a-z]/.test(password)) score++;
      if (/[A-Z]/.test(password)) score++;
      if (/[0-9]/.test(password)) score++;
      if (/[^a-zA-Z0-9]/.test(password)) score++;

      var levels = [
        { max: 2, width: '20%', color: '#f5576c', label: '非常弱' },
        { max: 3, width: '40%', color: '#f093fb', label: '弱' },
        { max: 4, width: '60%', color: '#ffd93d', label: '一般' },
        { max: 5, width: '80%', color: '#6bcb77', label: '强' },
        { max: 99, width: '100%', color: '#43e97b', label: '非常强' }
      ];

      var level = levels[0];
      for (var i = 0; i < levels.length; i++) {
        if (score <= levels[i].max) { level = levels[i]; break; }
      }

      var fill = document.getElementById('strengthFill');
      fill.style.width = level.width;
      fill.style.background = level.color;
      document.getElementById('strengthLabel').textContent = '强度：' + level.label;
    }

    function copyPassword() {
      var text = document.getElementById('passwordText').textContent;
      if (!text || text.indexOf('点击') === 0 || text.indexOf('已生成') === 0) return;
      navigator.clipboard.writeText(text).then(function() {
        var btn = document.getElementById('copyBtn');
        btn.textContent = '已复制！';
        setTimeout(function() { btn.textContent = '复制'; }, 1500);
      });
    }

    function copyOne(btn, text) {
      navigator.clipboard.writeText(text).then(function() {
        btn.textContent = '已复制';
        setTimeout(function() { btn.textContent = '复制'; }, 1500);
      });
    }
  </script>
</body>
</html>
